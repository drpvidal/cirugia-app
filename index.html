function calcularEdad(fechaNac) {
  if (!fechaNac) return null;
  const hoy = new Date(), nac = new Date(fechaNac + "T12:00:00");
  let edad = hoy.getFullYear() - nac.getFullYear();
  const m = hoy.getMonth() - nac.getMonth();
  if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
  return edad;
}
function formatFecha(s) {
  if (!s) return "";
  const [y,m,d] = s.split("-");
  return `${d}/${m}/${y}`;
}
function offsetFecha(s, dias) {
  if (!s) return "";
  const d = new Date(s + "T12:00:00");
  d.setDate(d.getDate() + dias);
  return d.toISOString().split("T")[0];
}

    if (estado.paso === 1) html = renderPaso1();
    if (estado.paso === 2) html = renderPaso2();
    if (estado.paso === 3) html = renderPaso3();
    if (estado.paso === 4) html = renderPaso4();
    if (estado.paso === 5) html = renderPaso5();
    html += renderNav();
    contenido.innerHTML = html;
  }
  bindEvents();
}

// ── PASO 1: Paciente ─────────────────────────────────────────
function renderPaso1() {
  const f = estado.form;
  const edad = calcularEdad(f.fechaNac);
  const edadHtml = edad !== null
    ? `<div class="edad-display">${edad} años</div>`
    : `<div class="edad-display vacio">← ingrese fecha de nacimiento</div>`;

  const hospitalesOpts = HOSPITALES.map(h =>
    `<option value="${h.nombre}" ${f.hospital===h.nombre?"selected":""}>${h.nombre}</option>`
  ).join("");
  const procOpts = PROCEDIMIENTOS.map(p =>
    `<option value="${p.nombre}" ${f.procedimiento===p.nombre?"selected":""}>${p.nombre}</option>`
  ).join("");
  const direccion = f.hospital ? HOSPITALES.find(h=>h.nombre===f.hospital)?.direccion : "";

  return `
    <h2>📋 Datos del Paciente</h2>
    <div class="campo">
      <label>Nombre completo del paciente <span class="req">*</span></label>
      <input type="text" id="paciente" placeholder="Apellidos, Nombre" value="${f.paciente}">
    </div>
    <div class="grid2">
      <div class="campo">
        <label>Fecha de nacimiento <span class="req">*</span></label>
        <input type="date" id="fechaNac" value="${f.fechaNac}">
      </div>
      <div class="campo">
        <label>Edad (automática)</label>
        ${edadHtml}
      </div>
    </div>
    <div class="grid2">
      <div class="campo">
        <label>Teléfono del paciente</label>
        <input type="tel" id="telefono" placeholder="55 1234 5678" value="${f.telefono}">
      </div>
      <div class="campo">
        <label>Correo electrónico</label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com" value="${f.correo}">
      </div>
    </div>
    <div class="campo">
      <label>Procedimiento quirúrgico <span class="req">*</span></label>
      <select id="procedimiento">
        <option value="">— Seleccione procedimiento —</option>
        ${procOpts}
      </select>
    </div>
    <div class="campo">
      <label>Hospital <span class="req">*</span></label>
      <select id="hospital">
        <option value="">— Seleccione hospital —</option>
        ${hospitalesOpts}
      </select>
      ${direccion ? `<p class="direccion-hint">📍 ${direccion}</p>` : ""}
    </div>
  `;
}

// ── PASO 2: Fechas y horas ────────────────────────────────────
function renderPaso2() {
  const f = estado.form;
  const resumen = `<div style="background:#eef6fa;border-radius:9px;padding:10px 14px;margin-bottom:18px;border:1px solid #d0e4ed;font-size:13px;color:#5a7a8a;">
    <strong style="color:#1a2e38">${f.paciente}</strong> · ${f.procedimiento}</div>`;

  const horasIngHtml = [...HORAS_INGRESO, "Otra"].map((h,i) => {
    const esOtra = h === "Otra";
    const activo = esOtra ? estado.horaIngresoCustOtra : f.horaIngreso === h;
    return `<button class="hora-btn${activo?" activo":""}${esOtra?" otra":""}" onclick="selHoraIngreso('${h}')">${h}</button>`;
  }).join("");

  const horasCxHtml = [...HORAS_CIRUGIA, "Otra"].map((h,i) => {
    const esOtra = h === "Otra";
    const activo = esOtra ? estado.horaCxOtra : f.horaCx === h;
    return `<button class="hora-btn${activo?" activo":""}${esOtra?" otra":""}" onclick="selHoraCx('${h}')">${h}</button>`;
  }).join("");

  const fechaCxFin = fechaCxFinal();
  const ayunoFecha = f.fechaIngreso ? formatFecha(offsetFecha(f.fechaIngreso, -1)) : "";

  return `
    <h2>📅 Fechas y Horas</h2>
    ${resumen}
    <div class="campo">
      <label>Fecha de ingreso <span class="req">*</span></label>
      <input type="date" id="fechaIngreso" value="${f.fechaIngreso}">
    </div>
    <div class="campo">
      <label>Hora de ingreso <span class="req">*</span></label>
      <div class="hora-btns">${horasIngHtml}</div>
      ${estado.horaIngresoCustOtra ? `<input type="text" class="hora-input" id="horaIngresoCust" placeholder="HH:MM" value="${!HORAS_INGRESO.includes(f.horaIngreso)?f.horaIngreso:""}" maxlength="5">` : ""}
    </div>
    <div class="campo">
      <label>Fecha de cirugía <span class="req">*</span></label>
      <div class="fecha-btns">
        <button class="fecha-btn${f.opcionFechaCx==="1"?" activo":""}" onclick="setFechaCxOp('1')">Mismo día</button>
        <button class="fecha-btn${f.opcionFechaCx==="2"?" activo":""}" onclick="setFechaCxOp('2')">Día siguiente</button>
        <button class="fecha-btn${f.opcionFechaCx==="3"?" activo":""}" onclick="setFechaCxOp('3')">Otra fecha</button>
      </div>
      ${f.opcionFechaCx==="3" ? `<input type="date" id="fechaCxPersonalizada" value="${f.fechaCxPersonalizada}">` : ""}
      ${fechaCxFin && f.opcionFechaCx!=="3" ? `<p class="direccion-hint">📅 Fecha de cirugía: <strong>${formatFecha(fechaCxFin)}</strong></p>` : ""}
    </div>
    <div class="campo">
      <label>Hora de cirugía <span class="req">*</span></label>
      <div class="hora-btns">${horasCxHtml}</div>
      ${estado.horaCxOtra ? `<input type="text" class="hora-input" id="horaCxCust" placeholder="HH:MM" value="${!HORAS_CIRUGIA.includes(f.horaCx)?f.horaCx:""}" maxlength="5">` : ""}
    </div>
    ${ayunoFecha ? `<div class="ayuno-box">⏰ <strong>Ayuno automático:</strong> 23:30 hrs del día ${ayunoFecha} (No tomar ni agua)</div>` : ""}
    <div class="campo">
      <label>Color en Google Calendar</label>
      <div class="colores">
        ${COLORES_CAL.map(c => `<button class="color-btn${f.colorCalendario===c?" activo":""}" style="background:${c}" onclick="set('colorCalendario','${c}')"></button>`).join("")}
      </div>
    </div>
  `;
}

// ── PASO 3: Equipo ────────────────────────────────────────────
function renderPaso3() {
  const f = estado.form;
  const anestOpts = EQUIPO.filter(m=>m.rol==="Anestesiólogo").map(m =>
    `<option value="${m.nombre}" ${f.anestesiologo===m.nombre?"selected":""}>${m.nombre}</option>`
  ).join("");

  const equipoHtml = EQUIPO.filter(m=>m.rol!=="Anestesiólogo").map(m => {
    const sel = f.equipo.includes(m.nombre);
    return `<label class="equipo-item${sel?" seleccionado":""}">
      <input type="checkbox" ${sel?"checked":""} onchange="toggleEquipo('${m.nombre}')">
      <span class="equipo-nombre">${m.nombre}</span>
      <span class="equipo-rol">${m.rol}</span>
    </label>`;
  }).join("");

  const invitados = [
    f.anestesiologo && `• ${f.anestesiologo}`,
    ...f.equipo.map(n=>`• ${n}`)
  ].filter(Boolean);

  return `
    <h2>👥 Equipo Quirúrgico</h2>
    <div class="campo">
      <label>Anestesiólogo principal</label>
      <select id="anestesiologo">
        <option value="">— Seleccione —</option>
        ${anestOpts}
      </select>
    </div>
    <div class="campo">
      <label>Ayudantes y otros participantes</label>
      <div class="equipo-lista">${equipoHtml}</div>
    </div>
    ${invitados.length > 0 ? `
    <div class="invitaciones">
      <p>📧 Invitaciones de Google Calendar a:</p>
      ${invitados.map(i=>`<span>${i}</span>`).join("")}
    </div>` : ""}
  `;
}

// ── PASO 4: Materiales ────────────────────────────────────────
function renderPaso4() {
  const f = estado.form;
  const items = f.insumos.map((ins,i) =>
    `<div class="material-item">
      <span>📦 ${ins}</span>
      <button class="material-quitar" onclick="quitarInsumo(${i})">×</button>
    </div>`
  ).join("") || `<p style="text-align:center;color:#5a7a8a;font-size:13px;padding:8px 0">Sin insumos</p>`;

  return `
    <h2>🧰 Lista de Materiales</h2>
    <p style="font-size:13px;color:#5a7a8a;margin-bottom:14px">Se incluirán en las <strong>notas del evento</strong> de Google Calendar.</p>
    <div class="materiales-lista">${items}</div>
    <div class="campo">
      <label>Insumos adicionales para este caso</label>
      <textarea id="insumosExtra" placeholder="Materiales adicionales específicos para este caso...">${f.insumosExtra}</textarea>
    </div>
  `;
}

// ── PASO 5: Resumen ───────────────────────────────────────────
function renderPaso5() {
  const f = estado.form;
  const edad = calcularEdad(f.fechaNac);
  const fechaCx = fechaCxFinal();
  const ayunoFecha = f.fechaIngreso ? formatFecha(offsetFecha(f.fechaIngreso, -1)) : "";

  const secciones = [
    { icon:"👤", titulo:"Paciente", filas:[f.paciente, `${edad} años · Nacido: ${formatFecha(f.fechaNac)}`, f.telefono&&`Tel: ${f.telefono}`, f.correo&&`Email: ${f.correo}`].filter(Boolean) },
    { icon:"🔪", titulo:"Procedimiento", filas:[f.procedimiento, f.hospital] },
    { icon:"📅", titulo:"Fechas y Horas", filas:[`Ingreso: ${formatFecha(f.fechaIngreso)} a las ${f.horaIngreso} hrs`,`Cirugía: ${formatFecha(fechaCx)} a las ${f.horaCx} hrs`,`Ayuno: 23:30 hrs del ${ayunoFecha}`] },
    { icon:"👥", titulo:"Equipo", filas:[f.anestesiologo?`Anestesiólogo: ${f.anestesiologo}`:null,...f.equipo].filter(Boolean) },
    { icon:"🧰", titulo:"Materiales", filas:[`${f.insumos.length} insumos · en notas del calendario`] },
  ];

  const resumenHtml = secciones.map(s => `
    <div class="resumen-card">
      <div class="resumen-titulo">${s.icon} ${s.titulo}</div>
      ${s.filas.map(r=>`<div class="resumen-fila">${r}</div>`).join("")}
    </div>`).join("");

  const docHtml = renderDocumento();

  return `
    <h2>✅ Resumen y Confirmación</h2>
    ${resumenHtml}
    <p style="font-size:11px;font-weight:700;color:#4a90a4;text-transform:uppercase;letter-spacing:0.07em;margin:16px 0 10px">📄 Vista previa — Indicaciones de Ingreso</p>
    ${docHtml}
    <div class="aviso">⚡ Al confirmar: Google Calendar + invitaciones al equipo + Google Sheets + documento de indicaciones por correo.</div>
  `;
}

// ── DOCUMENTO PREVIEW ─────────────────────────────────────────
function renderDocumento() {
  const f = estado.form;
  const edad = calcularEdad(f.fechaNac);
  const fechaCx = fechaCxFinal();
  const hospital = HOSPITALES.find(h=>h.nombre===f.hospital);
  const ayunoFecha = f.fechaIngreso ? fechaLegible(offsetFecha(f.fechaIngreso, -1)) : "";

  return `
  <div class="doc-preview">
    <div class="doc-header">
      <p class="subtitulo">Dr. Pablo Vidal González · Cirugía General y Laparoscópica</p>
      <h3>Indicaciones Médicas para Ingreso a Cirugía General</h3>
    </div>
    <table class="doc-tabla">
      <tr>
        <td width="55%"><strong>Paciente:</strong> ${(f.paciente||"").toUpperCase()}</td>
        <td><strong>Edad:</strong> ${edad||""} años</td>
      </tr>
      <tr>
        <td><strong>Fecha de ingreso:</strong> ${formatFecha(f.fechaIngreso)}</td>
        <td><strong>Hora de ingreso:</strong> ${f.horaIngreso} hrs</td>
      </tr>
      <tr>
        <td colspan="2"><strong>Diagnóstico:</strong> ${(f.procedimiento||"").toUpperCase()}</td>
      </tr>
    </table>
    <p class="doc-seccion">1. Ingreso:</p>
    <p class="doc-item">Ingresar por admisión:</p>
    <p class="doc-item"><strong>${hospital?.nombre||""}</strong></p>
    <p class="doc-item" style="color:#5a7a8a;font-size:12.5px">Dirección: ${hospital?.direccion||""}</p>
    <p class="doc-seccion">2. Procedimiento Quirúrgico:</p>
    <p class="doc-item">Se opera de <strong>${(f.procedimiento||"").toUpperCase()}</strong> el día <strong>${fechaLegible(fechaCx)}</strong> a las <strong>${f.horaCx} hrs</strong>.</p>
    <p class="doc-seccion">3. Ayuno:</p>
    <p class="doc-item">Ayuno a partir de las <strong>23:30 horas</strong> del día <strong>${ayunoFecha}</strong> (No tomar ni agua).</p>
    <p class="doc-seccion">A su ingreso:</p>
    <p class="doc-item"><strong>1. Soluciones:</strong> Canalizar con solución Hartmann a 80 ml/hora.</p>
    <p class="doc-item"><strong>2. Prevención antiembólica:</strong> Medias TED al muslo.</p>
    <p class="doc-item"><strong>3. Estudios:</strong> BH, QS, Coagulograma, Tele de Tórax, Electrocardiograma.</p>
    <p class="doc-item"><strong>4. Avisar a su ingreso:</strong> Dr. Pablo Vidal · 55 2271 5257</p>
  </div>`;
}

// ── CONFIRMACIÓN ─────────────────────────────────────────────
function renderConfirmacion() {
  const f = estado.form;
  const fechaCx = fechaCxFinal();
  return `
  <div class="confirmacion">
    <div class="check">✓</div>
    <h2>Cirugía programada</h2>
    <p class="dato"><strong>${f.paciente}</strong></p>
    <p class="dato">${f.procedimiento}</p>
    <p class="dato">${f.hospital}</p>
    <p class="dato">${formatFecha(fechaCx)} · ${f.horaCx} hrs</p>
    <div class="acciones-box">
      <p>✅ Acciones ejecutadas:</p>
      <span>• Evento creado en Google Calendar con materiales en notas</span>
      <span>• Invitaciones enviadas al equipo quirúrgico</span>
      <span>• Registro guardado en Google Sheets</span>
      <span>• Indicaciones de ingreso enviadas por correo</span>
    </div>
    <button class="btn-secondary btn-full" onclick="toggleVerDoc()">${estado.verDoc?"▲ Ocultar documento":"📄 Ver indicaciones de ingreso"}</button>
    <button class="btn-primary btn-full" onclick="nuevaCirugia()">+ Programar otra cirugía</button>
    ${estado.verDoc ? renderDocumento() : ""}
  </div>`;
}

// ── NAVEGACIÓN ────────────────────────────────────────────────
function renderNav() {
  const valido = pasoValido();
  const esUltimo = estado.paso === 5;
  const btnAnterior = estado.paso > 1
    ? `<button class="btn-secondary" onclick="irPaso(${estado.paso-1})">← Anterior</button>`
    : `<button class="btn-secondary invisible">← Anterior</button>`;

  const btnSiguiente = esUltimo
    ? `<button class="btn-primary btn-confirmar" onclick="confirmar()" ${estado.enviando?"disabled":""}>
        ${estado.enviando ? "⏳ Procesando..." : "✅ Confirmar Cirugía"}
       </button>`
    : `<button class="btn-primary" onclick="irPaso(${estado.paso+1})" ${!valido?"disabled":""}>Siguiente →</button>`;

  const errorHtml = estado.error
    ? `<div class="error-box">❌ ${estado.error}</div>`
    : "";

  return `
    <div class="nav">
      ${btnAnterior}
      <span class="nav-counter">${estado.paso} de 5</span>
      ${btnSiguiente}
    </div>
    ${errorHtml}
  `;
}

// ── EVENTOS ───────────────────────────────────────────────────
function bindEvents() {
  const bind = (id, key) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", e => set(key, e.target.value));
  };
  bind("paciente","paciente"); bind("fechaNac","fechaNac");
  bind("telefono","telefono"); bind("correo","correo");
  bind("procedimiento","procedimiento"); bind("hospital","hospital");
  bind("fechaIngreso","fechaIngreso"); bind("anestesiologo","anestesiologo");
  bind("insumosExtra","insumosExtra"); bind("fechaCxPersonalizada","fechaCxPersonalizada");

  const hic = document.getElementById("horaIngresoCust");
  if (hic) hic.addEventListener("input", e => { estado.form.horaIngreso = e.target.value; });

  const hcc = document.getElementById("horaCxCust");
  if (hcc) hcc.addEventListener("input", e => { estado.form.horaCx = e.target.value; });

  // Auto-cargar insumos al cambiar procedimiento
  const proc = document.getElementById("procedimiento");
  if (proc) proc.addEventListener("change", e => {
    const p = PROCEDIMIENTOS.find(p=>p.nombre===e.target.value);
    estado.form.insumos = p ? [...p.insumos] : [];
    render();
  });
}

// ── ACCIONES ─────────────────────────────────────────────────
function irPaso(n) { estado.paso = n; render(); window.scrollTo(0,0); }
function selHoraIngreso(h) {
  if (h === "Otra") { estado.horaIngresoCustOtra = true; estado.form.horaIngreso = ""; }
  else { estado.horaIngresoCustOtra = false; estado.form.horaIngreso = h; }
  render();
}
function selHoraCx(h) {
  if (h === "Otra") { estado.horaCxOtra = true; estado.form.horaCx = ""; }
  else { estado.horaCxOtra = false; estado.form.horaCx = h; }
  render();
}
function setFechaCxOp(op) { estado.form.opcionFechaCx = op; render(); }
function toggleEquipo(nombre) {
  const eq = estado.form.equipo;
  estado.form.equipo = eq.includes(nombre) ? eq.filter(n=>n!==nombre) : [...eq, nombre];
  render();
}
function quitarInsumo(i) { estado.form.insumos.splice(i,1); render(); }
function toggleVerDoc() { estado.verDoc = !estado.verDoc; render(); }

async function confirmar() {
  estado.enviando = true; estado.error = ""; render();
  try {
    const f = estado.form;
    const payload = { ...f, edad: calcularEdad(f.fechaNac), fechaCirugia: fechaCxFinal() };
    const resp = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify(payload) });
    const data = await resp.json();
    if (data.ok) { estado.confirmado = true; }
    else { estado.error = "Error: " + (data.error || "Intenta de nuevo"); }
  } catch(e) {
    estado.error = "Error de conexión. Verifica tu internet e intenta de nuevo.";
  }
  estado.enviando = false;
  render();
  window.scrollTo(0,0);
}

function nuevaCirugia() {
  estado = { paso:1, confirmado:false, enviando:false, error:"", verDoc:false, horaIngresoCustOtra:false, horaCxOtra:false,
    form:{ paciente:"",fechaNac:"",telefono:"",correo:"",procedimiento:"",hospital:"",fechaIngreso:"",horaIngreso:"",opcionFechaCx:"1",fechaCxPersonalizada:"",horaCx:"",colorCalendario:"#039be5",anestesiologo:"",equipo:[],insumos:[],insumosExtra:"" }
  };
  render(); window.scrollTo(0,0);
}

// ── INICIO ────────────────────────────────────────────────────
render();
</script>
</body>
</html>
